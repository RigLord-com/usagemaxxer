name: Release

# Build UsageMaxxer.exe from source on GitHub's runners. The build has no
# repository-write credential; publication happens only after artifact checksum
# verification and provenance attestation in a separate job.
#
# To cut a release:  git tag v1.2.3 && git push origin v1.2.3

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-2025
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12.10"

      - name: Install dependencies
        run: |
          python -m pip install --require-hashes --only-binary=:all: -r requirements.lock

      - name: Run tests and validate release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python -m unittest discover -v
          python verify_release.py --tag "$env:RELEASE_TAG"

      # Same command as the README's "Build the .exe" section — kept in sync so
      # a local build and the CI build produce the same artifact.
      - name: Build UsageMaxxer.exe
        run: >
          python -m PyInstaller --noconfirm --onefile --windowed
          --name UsageMaxxer --icon assets/app.ico
          --version-file version_info.txt
          --add-data "assets/app.ico;assets"
          --hidden-import pystray._win32
          usagemaxxer.py

      - name: Create checksum
        run: |
          $hash = (Get-FileHash dist/UsageMaxxer.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  UsageMaxxer.exe" | Set-Content -NoNewline dist/UsageMaxxer.exe.sha256
          Copy-Item LICENSE dist/LICENSE.txt
          Copy-Item THIRD_PARTY_NOTICES.md dist/THIRD_PARTY_NOTICES.md

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96b4a1ef7235a096b17240c259729fdd70c83d45
        with:
          subject-path: dist/UsageMaxxer.exe

      - name: Upload release artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: UsageMaxxer-release
          path: |
            dist/UsageMaxxer.exe
            dist/UsageMaxxer.exe.sha256
            dist/LICENSE.txt
            dist/THIRD_PARTY_NOTICES.md
          if-no-files-found: error

  publish:
    needs: build
    runs-on: windows-2025
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Download release artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: UsageMaxxer-release
          path: dist

      - name: Verify downloaded artifact
        run: |
          $expected = (Get-Content dist/UsageMaxxer.exe.sha256).Split()[0]
          $actual = (Get-FileHash dist/UsageMaxxer.exe -Algorithm SHA256).Hash.ToLower()
          if ($actual -ne $expected) { throw "Release artifact checksum mismatch" }

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: >
          gh release create "$env:RELEASE_TAG"
          dist/UsageMaxxer.exe
          dist/UsageMaxxer.exe.sha256
          dist/LICENSE.txt
          dist/THIRD_PARTY_NOTICES.md
          --title "$env:RELEASE_TAG"
          --draft
          --generate-notes
